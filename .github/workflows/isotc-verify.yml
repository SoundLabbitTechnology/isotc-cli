name: Intent and Architecture Verification
on: [pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm install -g isotc-cli
      - run: |
          set +e
          OUTPUT=$(isotc verify)
          echo "$OUTPUT"
          # 違反があればPRに自動コメントする処理がここに入る
